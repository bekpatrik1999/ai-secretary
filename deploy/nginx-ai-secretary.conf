# Reverse proxy for AI Secretary on secr-app-d01 (172.16.7.215)
# Drop into /etc/nginx/sites-available/ai-secretary and symlink into sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name secr-app-d01 172.16.7.215;

    # Audio uploads can be large; raise the body size cap.
    client_max_body_size 1024m;
    client_body_timeout  600s;
    send_timeout         600s;

    # Long transcription/protocol generation requests hold the connection.
    proxy_read_timeout   3600s;
    proxy_send_timeout   3600s;
    proxy_connect_timeout 60s;

    access_log /var/log/nginx/ai-secretary.access.log;
    error_log  /var/log/nginx/ai-secretary.error.log;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
